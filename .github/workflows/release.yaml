name: Release

on:
  push:
    tags:
      - '[0-9]*'

permissions:
  contents: read
  packages: write

jobs:

  release-build-push:
    runs-on: [gpu]

    strategy:
      matrix:
        target: [develop]
        os: [ubuntu22.04, ubuntu24.04]
        cuda_version: [12.5.1, 13.0.2]
        optix_version: [7.7.0]
        geant4_version: [11.3.2]
        cmake_version: [3.22.1]

        include:
          - target: release
            os: ubuntu24.04
            cuda_version: 13.0.2
            optix_version: 8.1.0
            geant4_version: 11.3.2
            cmake_version: 4.2.1

    steps:
      - name: Define environment variables
        run: |
          echo IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV
          echo IMAGE_TAG=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')-${{ matrix.cuda_version }}-${{ matrix.target }}-${{ matrix.os }} >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to registries
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            docker.io/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          target: ${{ matrix.target }}
          build-args: |
            OS=${{ matrix.os }}
            CUDA_VERSION=${{ matrix.cuda_version }}
            OPTIX_VERSION=${{ matrix.optix_version }}
            GEANT4_VERSION=${{ matrix.geant4_version }}
            CMAKE_VERSION=${{ matrix.cmake_version }}
          cache-from: type=local,src=/home/runner/.buildx-cache
          cache-to: type=local,dest=/home/runner/.buildx-cache-new,mode=max

      - name: Move cache
        # Temp fix
        # https://github.com/docker/build-push-action/issues/252
        # https://github.com/moby/buildkit/issues/1896
        run: |
          rm -rf /home/runner/.buildx-cache
          mv /home/runner/.buildx-cache-new /home/runner/.buildx-cache

  release-cleanup:
    runs-on: ubuntu-latest
    needs: release-build-push
    steps:
      - uses: dataaxiom/ghcr-cleanup-action@v1
